<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="header-title">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <span>Music Search</span>
      </div>

      <!-- Provider switcher -->
      <div class="provider-switcher">
        <button class="provider-btn" data-provider="spotify">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.48.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
          Spotify
        </button>
        <button class="provider-btn" data-provider="qobuz">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3a9 9 0 1 0 9 9 .5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5 11 11 0 1 1-5.865-9.738.5.5 0 0 1 .16.683l-.5.866a.5.5 0 0 1-.688.163A8.97 8.97 0 0 0 12 3z"/></svg>
          Qobuz
        </button>
        <button class="provider-btn" data-provider="deezer">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M18.81 4.16v3.03H24V4.16h-5.19zM6.27 8.38v3.03h5.19V8.38H6.27zm6.27 0v3.03h5.19V8.38h-5.19zm6.27 0v3.03H24V8.38h-5.19zM6.27 12.6v3.04h5.19V12.6H6.27zm6.27 0v3.04h5.19V12.6h-5.19zm6.27 0v3.04H24V12.6h-5.19zM0 16.81v3.04h5.19v-3.04H0zm6.27 0v3.04h5.19v-3.04H6.27zm6.27 0v3.04h5.19v-3.04h-5.19zm6.27 0v3.04H24v-3.04h-5.19z"/></svg>
          Deezer
        </button>
      </div>

      <a class="github-link" href="https://github.com/YoGo9/Spotify-Song-Search" target="_blank" rel="noopener" title="View on GitHub" aria-label="View on GitHub">
        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
      </a>
      <button class="settings-btn" id="settings-btn" title="Settings" aria-label="Open settings">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      </button>
    </div>
  </header>

  <!-- Settings Panel -->
  <aside class="settings-panel" id="settings-panel" aria-hidden="true">
    <div class="settings-inner">
      <div class="settings-header">
        <h2>Settings</h2>
        <button class="settings-close" id="settings-close" aria-label="Close settings">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>

      <section class="settings-section">
        <h3>Spotify</h3>
        <p class="settings-hint">Get credentials at <a href="https://developer.spotify.com/dashboard" target="_blank">developer.spotify.com</a></p>
        <div class="field-group">
          <label for="client-id">Client ID</label>
          <input type="text" id="client-id" placeholder="Paste Client ID" autocomplete="off" spellcheck="false">
        </div>
        <div class="field-group">
          <label for="client-secret">Client Secret</label>
          <input type="password" id="client-secret" placeholder="Paste Client Secret" autocomplete="off">
        </div>
        <button class="btn-primary" id="save-credentials">Save &amp; Authenticate</button>
        <p class="save-status" id="auth-status"></p>
      </section>

      <section class="settings-section">
        <h3>Qobuz</h3>
        <p class="settings-hint">Your Qobuz App ID (from developer portal)</p>
        <div class="field-group">
          <label for="qobuz-app-id">App ID</label>
          <input type="text" id="qobuz-app-id" placeholder="e.g. 712109809" autocomplete="off" spellcheck="false">
        </div>
        <button class="btn-primary btn-qobuz" id="save-qobuz">Save &amp; Test</button>
        <p class="save-status" id="qobuz-status"></p>
      </section>

      <section class="settings-section">
        <h3>Service URLs</h3>
        <div class="field-group">
          <label for="harmony-url">Harmony base URL</label>
          <input type="text" id="harmony-url" placeholder="https://harmony.pulsewidth.org.uk" spellcheck="false">
        </div>
        <div class="field-group">
          <label for="mb-url">MusicBrainz base URL</label>
          <input type="text" id="mb-url" placeholder="https://beta.musicbrainz.org" spellcheck="false">
        </div>
        <button class="btn-secondary" id="save-urls">Save URLs</button>
        <p class="save-status" id="url-status"></p>
      </section>

      <section class="settings-section">
        <h3>Results</h3>
        <div class="field-group">
          <label for="results-per-page">Per page</label>
          <select id="results-per-page">
            <option value="10">10</option>
            <option value="20" selected>20</option>
            <option value="50">50</option>
          </select>
        </div>
      </section>
    </div>
  </aside>
  <div class="settings-overlay" id="settings-overlay"></div>

  <!-- Main -->
  <main class="main">
    <div class="search-wrap">
      <div class="search-bar">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="search-input" placeholder="Search tracks…" autocomplete="off" spellcheck="false">
        <button class="search-clear" id="search-clear" aria-label="Clear search" style="display:none">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div class="search-mode-toggle">
        <button class="mode-btn active" id="mode-simple">Simple</button>
        <button class="mode-btn" id="mode-advanced">Advanced</button>
      </div>
      <div class="advanced-fields" id="advanced-fields" style="display:none">
        <input type="text" id="adv-track"  placeholder="Track name"  autocomplete="off" spellcheck="false">
        <input type="text" id="adv-artist" placeholder="Artist name" autocomplete="off" spellcheck="false">
      </div>
    </div>

    <div class="results-meta" id="results-meta" style="display:none">
      <span id="results-count"></span>
    </div>

    <div class="loading" id="loading" style="display:none">
      <div class="loading-bar"></div>
    </div>

    <div class="no-creds-notice" id="no-creds-notice" style="display:none">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
      Add credentials in <button class="inline-settings-link" id="open-settings-inline">Settings ⚙</button> to start searching.
    </div>

    <div id="results" class="results-grid"></div>

    <div class="load-more-wrap" id="load-more-wrap" style="display:none">
      <button class="btn-load-more" id="load-more">Load more</button>
    </div>
  </main>

  <!-- Card template -->
  <template id="track-card-template">
    <article class="track-card">
      <div class="card-art-wrap">
        <img class="card-art" alt="" loading="lazy">
        <button class="preview-btn" aria-label="Play preview" style="display:none">
          <svg class="icon-play" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
          <svg class="icon-pause" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
        </button>
        <div class="preview-progress" style="display:none">
          <div class="preview-progress-bar"></div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-title-row">
          <h3 class="card-title"></h3>
        </div>
        <div class="card-artist-row">
          <span class="card-artist"></span>
        </div>
        <p class="card-album"></p>
        <div class="card-meta-row">
          <span class="card-year"></span>
          <span class="card-pop"></span>
        </div>

        <div class="card-isrc-row">
          <span class="isrc-label">ISRC</span>
          <span class="isrc-value">—</span>
          <button class="copy-btn isrc-copy" data-copy="isrc" title="Copy ISRC" style="display:none">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
          </button>
        </div>

        <div class="card-links">
          <a class="chip chip-provider" target="_blank" rel="noopener">Open</a>
          <a class="chip chip-odesli" target="_blank" rel="noopener">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>
            Odesli
          </a>
          <a class="chip chip-harmony" target="_blank" rel="noopener">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"></path><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path></svg>
            Harmony
          </a>
          <a class="chip chip-mb isrc-mb-link" target="_blank" rel="noopener" style="display:none">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
            MusicBrainz
          </a>
        </div>
      </div>
    </article>
  </template>

  <script type="module" src="js/app.js"></script>
</body>
</html>
